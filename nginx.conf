server {
    listen 80;
    server_name ec2-35-154-159-107.ap-south-1.compute.amazonaws.com;

    # Allow Let's Encrypt ACME challenge (needed to get the SSL cert)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Route /api/* to the Flask Backend container (Port 5000)
    location /api/ {
        proxy_pass http://localhost:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route everything else to the Vite Frontend container (Port 5173)
    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
