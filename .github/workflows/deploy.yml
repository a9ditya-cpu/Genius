name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create a 2GB swap file to prevent the EC2 instance from running out of memory
            if [ ! -f /swapfile ]; then
              echo "Creating Swap File..."
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
            
            cd ~
            
            # Check if the repository exists, if not clone it
            if [ ! -d "Genius" ]; then
              git clone https://github.com/a9ditya-cpu/Genius.git Genius
            fi
            
            cd Genius
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Export the MongoDB Atlas connection string
            export MONGO_URI="${{ secrets.MONGO_URI }}"
            
            # Tear down old containers
            docker-compose down
            
            # Rebuild the containers one at a time to save memory
            docker-compose build backend
            docker-compose build frontend
            
            # Start everything in the background
            docker-compose up -d
            
            # Setup HTTPS with Nginx + Let's Encrypt (auto-skips if already configured)
            chmod +x ~/Genius/setup_https.sh
            bash ~/Genius/setup_https.sh

