name: Deploy to AWS EC2

on:
  push:
    branches:
      - main # Change this to 'master' if your main branch is called master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu # Default username for Ubuntu AMIs
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the home directory
            cd ~
            
            # Check if the repository exists, if not clone it
            if [ ! -d "Genius" ]; then
              git clone https://github.com/a9ditya-cpu/Genius.git Genius
            fi
            
            cd Genius
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Add the EC2 IP to the frontend environment
            echo "VITE_API_BASE_URL=http://${{ secrets.EC2_HOST }}:5000/api" > frontend/.env.production
            
            # Export the MongoDB Atlas connection string so docker-compose can pass it to the backend
            export MONGO_URI="${{ secrets.MONGO_URI }}"
            
            # Tear down old containers to prevent ContainerConfig recreation bugs
            docker-compose down
            
            # Rebuild and restart the docker containers in the background
            docker-compose up --build -d
